name: CI
on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'refactor/**', 'docs/**', 'style/**', 'test/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      - run: npx tsc --noEmit
      - run: npm run lint
